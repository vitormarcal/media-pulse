            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopTrackResponse"
  /api/music/tops/genres:
    get:
      summary: Top genres
      tags: [Music]
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopGenreResponse"
  /api/music/albums/{albumId}:
    get:
      summary: Album page
      tags: [Music]
      parameters:
        - name: albumId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlbumPageResponse"
  /api/music/artists/{artistId}:
    get:
      summary: Artist page
      tags: [Music]
      parameters:
        - name: artistId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistPageResponse"
  /api/music/tracks/{trackId}:
    get:
      summary: Track page
      tags: [Music]
      parameters:
        - name: trackId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackPageResponse"
  /api/music/albums/never-played:
    get:
      summary: Never played albums
      tags: [Music]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopAlbumResponse"
  /api/music/coverage/artists:
    get:
      summary: Artist coverage
      tags: [Music]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArtistCoverageResponse"
  /api/music/coverage/albums:
    get:
      summary: Album coverage
      tags: [Music]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlbumCoverageResponse"
  /api/music/search:
    get:
      summary: Music search
      tags: [Music]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
  /api/music/genres/trending:
    get:
      summary: Trending genres
      tags: [Music]
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: compareStart
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: compareEnd
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendingGenreResponse"
  /api/music/genres/recent:
    get:
      summary: Recent genres
      tags: [Music]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentGenreResponse"
  /api/music/genres/underplayed:
    get:
      summary: Underplayed genres
      tags: [Music]
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: minLibraryAlbums
          in: query
          required: false
          schema:
            type: integer
            default: 3
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UnderplayedGenreResponse"
  /api/music/genres/top-by-source:
    get:
      summary: Top genres by source
      tags: [Music]
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopGenreBySourceResponse"
  /api/music/admin/track-duplicates:
    get:
      summary: Review duplicate tracks
      tags: [Music]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: includeIgnored
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: artist
          in: query
          required: false
          schema:
            type: string
        - name: album
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateTrackReviewPageResponse"
  /api/music/admin/track-duplicates/ignore:
    post:
      summary: Ignore or restore duplicate track group
      tags: [Music]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DuplicateTrackIgnoreRequest"
      responses:
        "200":
          description: OK
  /api/music/admin/track-duplicates/merge:
    post:
      summary: Merge one duplicate track group
      tags: [Music]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DuplicateTrackMergeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateTrackMergeResponse"
  /api/music/admin/track-duplicates/merge-batch:
    post:
      summary: Merge duplicate track groups in batch
      tags: [Music]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DuplicateTrackBatchMergeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateTrackBatchMergeResponse"

  /api/spotify/import:
    post:
      summary: Spotify import
      tags: [Spotify]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpotifyImportRequest"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifyImportResponse"
  /api/spotify/backfill-album-tracks:
    post:
      summary: Spotify backfill album tracks
      tags: [Spotify]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifyBackfillResponse"
  /api/spotify/extended/import:
    post:
      summary: Spotify extended import
      tags: [Spotify]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifyImportResponse"

  /oauth/spotify/login:
    get:
      summary: Spotify OAuth login
      tags: [OAuth]
      responses:
        "302":
          description: Redirect to Spotify authorize URL
        "404":
          description: OAuth disabled
  /oauth/spotify/callback:
    get:
      summary: Spotify OAuth callback
      tags: [OAuth]
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
        "400":
          description: Bad request
          content:
            text/plain:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: Not found
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string

  /webhook/plex:
    post:
      summary: Plex webhook
      tags: [Webhook]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [payload]
              properties:
                payload:
                  type: string
                thumb:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK

  /api/plex/music/import:
    post:
      summary: Plex music import
      tags: [Plex]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlexMusicImportRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlexMusicImportResponse"

  /api/movies/recent:
    get:
      summary: Recent watched movies
      tags: [Movies]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            nullable: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoviesRecentResponse"

  /api/movies/{movieId}:
