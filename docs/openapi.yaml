                $ref: "#/components/schemas/MovieDetailsResponse"

  /api/movies/library:
    get:
      summary: Movies library
      tags: [Movies]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            nullable: true
        - name: unwatched
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoviesLibraryResponse"

  /api/people/{slug}:
    get:
      summary: Person details by slug
      tags: [Movies]
      parameters:
        - name: slug
          in: path
          required: true
