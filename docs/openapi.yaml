      tags: [Shows]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShowCatalogSuggestionsResponse"

  /api/shows/catalog:
    post:
      summary: Create or reuse show catalog entry
      tags: [Shows]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualShowCatalogCreateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualShowCatalogCreateResponse"

  /api/shows/watches:
    post:
      summary: Create manual watch with catalog resolution for show
      tags: [Shows]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualShowWatchCreateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualShowWatchCreateResponse"

  /api/shows/{showId}/watches:
    post:
      summary: Create manual watch for existing show
      tags: [Shows]
      parameters:
        - name: showId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExistingShowWatchCreateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualShowWatchCreateResponse"

  /event-sources/reprocess:
    post:
      summary: Reprocess event sources
      tags: [EventSources]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReprocessRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultReprocessCounter"
  /event-sources/{id}/reprocess:
    post:
      summary: Reprocess event source by id
      tags: [EventSources]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultUnit"

  /api/musicbrainz/enrich-album-genres:
    post:
      summary: Enrich album genres
      tags: [MusicBrainz]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 200
      responses:
        "202":
          description: Accepted
  /api/musicbrainz/enrich-album-genres/drain:
    post:
      summary: Enrich album genres (drain)
      tags: [MusicBrainz]
      parameters:
        - name: batchSize
          in: query
          required: false
          schema:
            type: integer
            default: 200
        - name: maxTotal
          in: query
          required: false
          schema:
            type: integer
            default: 50000
      responses:
        "202":
          description: Accepted

components:
  schemas:
    BookReadStatus:
      type: string
      enum: [READ, CURRENTLY_READING, WANT_TO_READ, DID_NOT_FINISH, PAUSED, UNKNOWN]
    AuthorDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
      required: [id, name]
    EditionDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
          nullable: true
        isbn10:
          type: string
          nullable: true
        isbn13:
          type: string
          nullable: true
        pages:
          type: integer
          nullable: true
        language:
          type: string
          nullable: true
        publisher:
          type: string
          nullable: true
        format:
          type: string
          nullable: true
        coverUrl:
          type: string
          nullable: true
      required: [id]
    BookCardDto:
      type: object
      properties:
        bookId:
          type: integer
          format: int64
        slug:
          type: string
        title:
          type: string
        coverUrl:
          type: string
          nullable: true
        releaseDate:
          type: string
          format: date
          nullable: true
        rating:
          type: number
          format: double
          nullable: true
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        authors:
          type: array
          items:
            $ref: "#/components/schemas/AuthorDto"
      required: [bookId, slug, title, authors]
    ReadCardDto:
      type: object
      description: Consolidated reading session card; independent from provider event ids.
      properties:
        readId:
          type: integer
          format: int64
          description: Internal session identifier in Media Pulse.
        status:
          $ref: "#/components/schemas/BookReadStatus"
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        progressPct:
          type: number
          format: double
          nullable: true
        progressPages:
          type: integer
          nullable: true
        source:
          type: string
        book:
          $ref: "#/components/schemas/BookCardDto"
        edition:
          $ref: "#/components/schemas/EditionDto"
          nullable: true
      required: [readId, status, source, book]
    BooksRangeDto:
      type: object
      properties:
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
      required: [start, end]
