openapi: 3.0.3
info:
  title: MediaPulse API
  version: 1.0.0-beta.61
  description: API surface for MediaPulse. This document covers the published HTTP surface, while the markdown files in `docs/` remain the canonical source for operational notes and endpoint semantics.
servers:
  - url: http://localhost:8080
tags:
  - name: Books
    description: Read-only books endpoints.
  - name: Movies
    description: Movie library, curation, enrichment, and watch endpoints.
  - name: Shows
    description: Show library, catalog, enrichment, and watch endpoints.
  - name: Music
    description: Music library and listening insights.
  - name: Spotify
    description: Spotify import and backfill endpoints.
  - name: Plex
    description: Plex import endpoints.
  - name: Webhook
    description: External webhook endpoints.
  - name: OAuth
    description: OAuth flows.
  - name: EventSources
    description: Event source reprocessing utilities.
  - name: MusicBrainz
    description: MusicBrainz enrichment utilities.
paths:
  /api/books/year/{year}:
    get:
      summary: Books year reads
      description: Returns reading sessions grouped by status for the requested year.
      tags: [Books]
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YearReadsResponse"
  /api/books/library:
    get:
      summary: Books library
      description: Returns the archived books wall used by the main books page archive mode.
      tags: [Books]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            example: id:123
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BooksLibraryResponse"
  /api/books/{bookId}:
    get:
      summary: Book details
      description: Returns book metadata plus reading sessions for that book.
      tags: [Books]
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookDetailsResponse"
  /api/books/authors/{authorId}:
    get:
      summary: Author details
      description: Returns the local catalog and recent reading activity for one author.
      tags: [Books]
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorDetailsResponse"
  /api/books/slug/{slug}:
    get:
      summary: Book details by slug
      description: Returns book metadata plus reading sessions for the matched slug.
      tags: [Books]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookDetailsResponse"
  /api/books/list:
    get:
      summary: List reads
      description: Lists reading sessions (not raw sync events), paginated by readId cursor.
      tags: [Books]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BookReadStatus"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            example: id:123
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BooksListResponse"
  /api/books/search:
    get:
      summary: Search books and authors
      tags: [Books]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BooksSearchResponse"
  /api/books/summary:
    get:
      summary: Books summary
      tags: [Books]
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [month, year, custom]
            default: month
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BooksSummaryResponse"
  /api/books/stats:
    get:
      summary: Books archive stats
      description: Returns archive-wide reading aggregates for library navigation and yearly chips.
      tags: [Books]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BooksStatsResponse"

  /api/music/summary:
    get:
      summary: Music summary
      tags: [Music]
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [week, month, custom]
            default: week
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicSummaryResponse"
  /api/music/stats:
    get:
      summary: Music stats
      tags: [Music]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicStatsResponse"
  /api/music/year/{year}:
    get:
      summary: Music by year
      tags: [Music]
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: limitAlbums
          in: query
          required: false
          schema:
            type: integer
            default: 80
        - name: limitArtists
          in: query
          required: false
          schema:
            type: integer
            default: 12
        - name: limitTracks
          in: query
          required: false
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicByYearResponse"
  /api/music/recent-albums:
    get:
      summary: Recent albums
      tags: [Music]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentAlbumsPageResponse"
  /api/music/library/artists:
    get:
      summary: Artist music library
      tags: [Music]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistLibraryPageResponse"
  /api/music/library/albums:
    get:
      summary: Album music library
      tags: [Music]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlbumLibraryPageResponse"
  /api/music/library/tracks:
    get:
      summary: Track music library
      tags: [Music]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackLibraryPageResponse"
  /api/music/tops/artists:
    get:
      summary: Top artists
      tags: [Music]
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopArtistResponse"
  /api/music/tops/albums:
    get:
      summary: Top albums
      tags: [Music]
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopAlbumResponse"
  /api/music/tops/tracks:
    get:
      summary: Top tracks
      tags: [Music]
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
