openapi: 3.0.3
info:
  title: MediaPulse API
  version: 1.0.0-beta.57
  description: API surface for MediaPulse. This document covers the published HTTP surface, while the markdown files in `docs/` remain the canonical source for operational notes and endpoint semantics.
servers:
  - url: http://localhost:8080
tags:
  - name: Books
    description: Read-only books endpoints.
  - name: Music
    description: Music library and listening insights.
  - name: Spotify
    description: Spotify import and backfill endpoints.
  - name: Plex
    description: Plex import endpoints.
  - name: Webhook
    description: External webhook endpoints.
  - name: OAuth
    description: OAuth flows.
  - name: EventSources
    description: Event source reprocessing utilities.
  - name: MusicBrainz
    description: MusicBrainz enrichment utilities.
paths:
  /api/books/year/{year}:
    get:
      summary: Books year reads
      description: Returns reading sessions grouped by status for the requested year.
      tags: [Books]
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YearReadsResponse"
  /api/books/{bookId}:
    get:
      summary: Book details
      description: Returns book metadata plus reading sessions for that book.
      tags: [Books]
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookDetailsResponse"
  /api/books/slug/{slug}:
    get:
      summary: Book details by slug
      description: Returns book metadata plus reading sessions for the matched slug.
      tags: [Books]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookDetailsResponse"
  /api/books/list:
    get:
      summary: List reads
      description: Lists reading sessions (not raw sync events), paginated by readId cursor.
      tags: [Books]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BookReadStatus"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            example: id:123
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BooksListResponse"
  /api/books/search:
    get:
      summary: Search books and authors
      tags: [Books]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BooksSearchResponse"
  /api/books/summary:
    get:
      summary: Books summary
      tags: [Books]
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [month, year, custom]
            default: month
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BooksSummaryResponse"
  /api/books/stats:
    get:
      summary: Books archive stats
      description: Returns archive-wide reading aggregates for library navigation and yearly chips.
      tags: [Books]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BooksStatsResponse"

  /api/music/summary:
    get:
      summary: Music summary
      tags: [Music]
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [week, month, custom]
            default: week
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicSummaryResponse"
  /api/music/stats:
    get:
      summary: Music stats
      tags: [Music]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicStatsResponse"
  /api/music/year/{year}:
    get:
      summary: Music by year
      tags: [Music]
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: limitAlbums
          in: query
          required: false
          schema:
            type: integer
            default: 80
        - name: limitArtists
          in: query
          required: false
          schema:
            type: integer
            default: 12
        - name: limitTracks
          in: query
          required: false
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicByYearResponse"
  /api/music/recent-albums:
    get:
      summary: Recent albums
      tags: [Music]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentAlbumsPageResponse"
  /api/music/library/artists:
    get:
      summary: Artist music library
      tags: [Music]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistLibraryPageResponse"
  /api/music/library/albums:
    get:
      summary: Album music library
      tags: [Music]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlbumLibraryPageResponse"
  /api/music/library/tracks:
    get:
      summary: Track music library
      tags: [Music]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackLibraryPageResponse"
  /api/music/tops/artists:
    get:
      summary: Top artists
      tags: [Music]
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopArtistResponse"
  /api/music/tops/albums:
    get:
      summary: Top albums
      tags: [Music]
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopAlbumResponse"
  /api/music/tops/tracks:
    get:
      summary: Top tracks
      tags: [Music]
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopTrackResponse"
  /api/music/tops/genres:
    get:
      summary: Top genres
      tags: [Music]
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopGenreResponse"
  /api/music/albums/{albumId}:
    get:
      summary: Album page
      tags: [Music]
      parameters:
        - name: albumId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlbumPageResponse"
  /api/music/albums/never-played:
    get:
      summary: Never played albums
      tags: [Music]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopAlbumResponse"
  /api/music/coverage/artists:
    get:
      summary: Artist coverage
      tags: [Music]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArtistCoverageResponse"
  /api/music/coverage/albums:
    get:
      summary: Album coverage
      tags: [Music]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlbumCoverageResponse"
  /api/music/search:
    get:
      summary: Music search
      tags: [Music]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
  /api/music/genres/trending:
    get:
      summary: Trending genres
      tags: [Music]
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: compareStart
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: compareEnd
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendingGenreResponse"
  /api/music/genres/recent:
    get:
      summary: Recent genres
      tags: [Music]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentGenreResponse"
  /api/music/genres/underplayed:
    get:
      summary: Underplayed genres
      tags: [Music]
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: minLibraryAlbums
          in: query
          required: false
          schema:
            type: integer
            default: 3
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UnderplayedGenreResponse"
  /api/music/genres/top-by-source:
    get:
      summary: Top genres by source
      tags: [Music]
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopGenreBySourceResponse"

  /api/spotify/import:
    post:
      summary: Spotify import
      tags: [Spotify]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpotifyImportRequest"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifyImportResponse"
  /api/spotify/backfill-album-tracks:
    post:
      summary: Spotify backfill album tracks
      tags: [Spotify]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifyBackfillResponse"
  /api/spotify/extended/import:
    post:
      summary: Spotify extended import
      tags: [Spotify]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifyImportResponse"

  /oauth/spotify/login:
    get:
      summary: Spotify OAuth login
      tags: [OAuth]
      responses:
        "302":
          description: Redirect to Spotify authorize URL
        "404":
          description: OAuth disabled
  /oauth/spotify/callback:
    get:
      summary: Spotify OAuth callback
      tags: [OAuth]
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
        "400":
          description: Bad request
          content:
            text/plain:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: Not found
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string

  /webhook/plex:
    post:
      summary: Plex webhook
      tags: [Webhook]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [payload]
              properties:
                payload:
                  type: string
                thumb:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK

  /api/plex/music/import:
    post:
      summary: Plex music import
      tags: [Plex]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlexMusicImportRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlexMusicImportResponse"

  /api/movies/recent:
    get:
      summary: Recent watched movies
      tags: [Movies]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MovieCardDto"

  /api/movies/{movieId}:
    get:
      summary: Movie details
      tags: [Movies]
      parameters:
        - name: movieId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieDetailsResponse"

  /api/movies/slug/{slug}:
    get:
      summary: Movie details by slug
      tags: [Movies]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieDetailsResponse"

  /api/movies/catalog:
    get:
      summary: Suggest movie catalog matches from TMDb
      tags: [Movies]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieCatalogSuggestionsResponse"
    post:
      summary: Create or reuse movie catalog entry
      tags: [Movies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualMovieCatalogCreateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualMovieCatalogCreateResponse"

  /api/movies/collections/backfill:
    post:
      summary: Backfill official TMDb movie collections
      tags: [Movies]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieCollectionBackfillResponse"

  /api/movies/collections/{collectionId}/tmdb-members:
    get:
      summary: Fetch official TMDb movie collection members
      tags: [Movies]
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieCollectionMembersResponse"

  /api/movies/{movieId}/enrichment/preview:
    post:
      summary: Preview movie enrichment from TMDb
      tags: [Movies]
      parameters:
        - name: movieId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieEnrichmentPreviewRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieEnrichmentPreviewResponse"

  /api/movies/{movieId}/enrichment/apply:
    post:
      summary: Apply movie enrichment from TMDb
      tags: [Movies]
      parameters:
        - name: movieId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieEnrichmentApplyRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieEnrichmentApplyResponse"

  /api/movies/{movieId}/watches:
    post:
      summary: Create manual watch for existing movie
      tags: [Movies]
      parameters:
        - name: movieId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExistingMovieWatchCreateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualMovieWatchCreateResponse"

  /api/movies/search:
    get:
      summary: Search movies by title or slug
      tags: [Movies]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoviesSearchResponse"

  /api/movies/summary:
    get:
      summary: Movies summary
      tags: [Movies]
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [month, year, custom]
            default: month
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoviesSummaryResponse"

  /event-sources/reprocess:
    post:
      summary: Reprocess event sources
      tags: [EventSources]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReprocessRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultReprocessCounter"
  /event-sources/{id}/reprocess:
    post:
      summary: Reprocess event source by id
      tags: [EventSources]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultUnit"

  /api/musicbrainz/enrich-album-genres:
    post:
      summary: Enrich album genres
      tags: [MusicBrainz]
